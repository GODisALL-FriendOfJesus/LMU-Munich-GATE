<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMU Clone</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="scroll-smooth bg-white">

    <header class="sticky top-0 z-50 bg-white shadow-md">
        <div class="max-w-[1600px] mx-auto flex items-center justify-between px-4 md:px-8 py-4">

            <div class="flex cursor-pointer transition duration-300 hover:scale-105">

                <div class="bg-green-700 text-white px-4 py-3 md:px-6 md:py-4">
                    <h1 class="text-4xl md:text-6xl font-bold leading-none">
                        LMU
                    </h1>
                </div>

                <div class="bg-green-700 text-white px-3 py-3 md:px-5 md:py-4 border-l border-white">
                    <p class="text-[10px] md:text-base font-semibold uppercase leading-tight">
                        Ludwig-<br>
                        Maximilians-<br>
                        Universität<br>
                        München
                    </p>
                </div>

            </div>

            <div class="flex items-center gap-8">

                <button class="text-2xl md:text-3xl transition duration-300 hover:text-green-700 hover:scale-110">
                    🔍
                </button>

                <button class="group">
                    <span class="block w-8 h-1 bg-black mb-1 transition duration-300 group-hover:bg-green-700"></span>
                    <span class="block w-8 h-1 bg-black mb-1 transition duration-300 group-hover:bg-green-700"></span>
                    <span class="block w-8 h-1 bg-black transition duration-300 group-hover:bg-green-700"></span>
                </button>

            </div>

        </div>
    </header>

    <section class="relative min-h-screen overflow-hidden">

        <img
            src="part1.PNG"
            alt="Image1"
            class="absolute inset-0 w-full h-full object-cover transition duration-700 hover:scale-105"
        >

        <div class="absolute inset-0 bg-black/10"></div>

        <div class="absolute bottom-0 right-0 w-full md:w-[700px] lg:w-[800px]">

            <div class="bg-white/95 backdrop-blur-sm shadow-2xl p-8 md:p-12 lg:p-14">

                <h2 class="text-4xl md:text-5xl lg:text-6xl font-bold mb-6">
                    The rhythm of life
                </h2>

                <p class="text-lg md:text-xl text-gray-700 leading-relaxed">
                    How regular repetition structures humans, society,
                    and natural processes. The new issue of our digital
                    magazine explores how rhythm influences daily life,
                    science, and culture.
                </p>

                <a
                    href="#"
                    class="inline-block mt-8 bg-green-700 text-white px-6 py-3 font-semibold transition duration-300 hover:bg-green-800 hover:-translate-y-1 hover:shadow-lg"
                >
                    Read More
                </a>

            </div>

        </div>

    </section>

</body>
</html>
